<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Estarot Admin</title>

  <style>
    :root {
      --bg: #120818;
      --card: #1f102b;
      --card2: #2b1638;
      --gold: #d8b26e;
      --soft-gold: #f1d9a5;
      --text: #fff8ee;
      --muted: #c8b8d1;
      --danger: #ff6b6b;
      --success: #9be7c5;
      --border: rgba(216,178,110,0.35);
      --shadow: 0 18px 45px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(216,178,110,0.22), transparent 35%),
        linear-gradient(180deg, #120818 0%, #1b0c24 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hidden {
      display: none !important;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
      padding: 28px 0 80px;
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: min(420px, 100%);
      background: rgba(31,16,43,0.96);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand .moon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h1, h2, h3 {
      margin: 0;
    }

    .brand h1 {
      color: var(--soft-gold);
      font-size: 28px;
      letter-spacing: 0.5px;
    }

    .brand p {
      color: var(--muted);
      margin: 8px 0 0;
      font-size: 14px;
    }

    .lang-switch {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 18px 0 8px;
    }

    .lang-btn {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      width: auto;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, #d8b26e, #fff0bf);
      color: #241225;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      color: var(--soft-gold);
      font-weight: 600;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216,178,110,0.13);
    }

    select option {
      background: #1f102b;
      color: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input[type="date"],
    input[type="month"] {
      -webkit-appearance: none;
      appearance: none;
      text-align: left;
      line-height: normal;
      min-height: 48px;
      display: block;
    }

    input[type="date"]::-webkit-date-and-time-value,
    input[type="month"]::-webkit-date-and-time-value {
      text-align: left;
      display: block;
      width: 100%;
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="month"]::-webkit-calendar-picker-indicator {
      opacity: 0.85;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #d8b26e, #fff0bf);
      color: #241225;
      width: 100%;
      margin-top: 18px;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.13);
    }

    .btn-danger {
      background: rgba(255,107,107,0.14);
      color: #ffb1b1;
      border: 1px solid rgba(255,107,107,0.3);
    }

    .btn-edit {
      background: rgba(216,178,110,0.13);
      color: #ffe7ad;
      border: 1px solid rgba(216,178,110,0.28);
    }

    .btn-small {
      padding: 9px 12px;
      font-size: 13px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .error {
      color: #ffb1b1;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      color: var(--success);
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .topbar h1 {
      color: var(--soft-gold);
      font-size: clamp(24px, 5vw, 38px);
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .stats-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 20px;
    }

    .card {
      background: rgba(31,16,43,0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .stat-card h3 {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 25px;
      color: var(--soft-gold);
      font-weight: 800;
      word-break: break-word;
    }

    .stat-card .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .main-grid {
      grid-template-columns: 0.9fr 1.1fr;
      align-items: start;
    }

    .section-title {
      color: var(--soft-gold);
      margin-bottom: 16px;
      font-size: 21px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .service-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 42px;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    .service-row button {
      border-radius: 14px;
      height: 47px;
      padding: 0;
    }

    .filter-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    .filter-bar > div {
      min-width: 0;
    }

    .records {
      display: grid;
      gap: 12px;
      max-height: 680px;
      overflow: auto;
      padding-right: 4px;
    }

    .record {
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 15px;
    }

    .record-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .record-date {
      color: var(--soft-gold);
      font-weight: 800;
    }

    .record-amount {
      font-size: 20px;
      font-weight: 900;
      color: #fff2bf;
      text-align: right;
    }

    .record-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .record-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      background: rgba(216,178,110,0.13);
      border: 1px solid rgba(216,178,110,0.25);
      color: #ffe7ad;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .notes {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 10px;
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .edit-banner {
      background: rgba(216,178,110,0.12);
      border: 1px solid rgba(216,178,110,0.28);
      color: #ffe7ad;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    @media (max-width: 880px) {
      .stats-grid,
      .main-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .top-actions .btn-secondary {
        flex: 1;
      }
    }

    @media (max-width: 540px) {
      .container {
        width: 94%;
        padding-top: 20px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .login-card {
        padding: 24px;
      }

      .row,
      .filter-bar {
        grid-template-columns: 1fr;
      }

      .service-row {
        grid-template-columns: minmax(0, 1fr) 70px 38px;
      }

      .record-head {
        flex-direction: column;
      }

      .record-amount {
        text-align: left;
      }

      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <section id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="moon">🌙</div>
        <h1 id="loginTitle">Estarot Admin</h1>
        <p id="loginSubtitle">Admin Page</p>

        <div class="lang-switch">
          <button type="button" id="loginLangZh" class="lang-btn">繁中</button>
          <button type="button" id="loginLangEn" class="lang-btn">EN</button>
        </div>
      </div>

      <form id="loginForm">
        <label for="email" data-i18n="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="password" data-i18n="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button id="loginBtn" class="btn-primary" type="submit">登入</button>

        <div id="loginError" class="error hidden"></div>
      </form>
    </div>
  </section>

  <main id="appScreen" class="container hidden">

    <div class="topbar">

        <button id="logoutBtn" class="btn-secondary">登出</button>

    </div>

    <section class="grid stats-grid">
      <div class="card stat-card">
        <h3 id="statGbpTitle">本月 GBP</h3>

        <div id="statMonthSub1" class="sub">所選月份</div>
      </div>

      <div class="card stat-card">
        <h3 id="statHkdTitle">本月 HKD</h3>
        <div id="monthHkd" class="value">HK$0</div>
        <div id="statMonthSub2" class="sub">所選月份</div>
      </div>

      <div class="card stat-card">
        <h3 id="statPopularTitle">最受歡迎服務</h3>
        <div id="popularService" class="value">-</div>
        <div id="popularServiceSub" class="sub">按數量計算</div>
      </div>

      <div class="card stat-card">
        <h3 id="statPaymentTitle">最常用收款方式</h3>
        <div id="topPayment" class="value">-</div>
        <div id="topPaymentSub" class="sub">所選月份</div>
      </div>
    </section>

    <section class="grid main-grid">

      <div class="card">
        <h2 id="formTitle" class="section-title">新增收入</h2>

        <div id="editBanner" class="edit-banner hidden"></div>

        <form id="incomeForm">

          <label for="date" id="dateLabel">收款日期</label>
          <input id="date" type="date" required />

          <label id="serviceLabel">服務內容</label>
          <div id="servicesContainer"></div>

          <button id="addServiceBtn" type="button" class="btn-secondary btn-small">+ 新增服務</button>

          <div class="row">
            <div>
              <label for="currency" id="currencyLabel">貨幣</label>
              <select id="currency" required>
                <option value="GBP">GBP</option>
                <option value="HKD">HKD</option>
              </select>
            </div>

            <div>
              <label for="paymentMethod" id="paymentMethodLabel">收款方式</label>
              <select id="paymentMethod" required></select>
            </div>
          </div>

          <label for="amount" id="amountLabel">金額</label>
          <input id="amount" type="number" step="0.01" min="0" placeholder="例如：35" required />

          <label for="notes" id="notesLabel">備註 Optional</label>
          <textarea id="notes" placeholder="例如：IG booking / package / special note"></textarea>

          <button id="saveBtn" class="btn-primary" type="submit">儲存紀錄</button>

          <div id="cancelEditWrap" class="button-row hidden">
            <button id="cancelEditBtn" type="button" class="btn-secondary">取消更改</button>
            <button id="clearFormBtn" type="button" class="btn-secondary">清空表格</button>
          </div>

          <div id="normalButtonsWrap">
            <button id="clearFormBtn2" type="button" class="btn-secondary" style="width:100%; margin-top:10px;">清空表格</button>
          </div>

          <div id="formMessage" class="success hidden"></div>
          <div id="formError" class="error hidden"></div>
        </form>

        <p id="privacyNote" class="footer-note">
          建議只記收入資料，不記客戶姓名或敏感內容，保障私隱。
        </p>
      </div>

      <div class="card">
        <h2 id="recordsTitle" class="section-title">收入紀錄</h2>

        <div class="filter-bar">
          <div>
            <label for="monthFilter" id="monthFilterLabel">月份篩選</label>
            <input id="monthFilter" type="month" />
          </div>

          <div>
            <label for="currencyFilter" id="currencyFilterLabel">貨幣篩選</label>

              <option value="GBP">GBP</option>
              <option value="HKD">HKD</option>
            </select>
          </div>
        </div>

        <div id="recordsList" class="records">
          <div class="empty">Loading records...</div>
        </div>
      </div>

    </section>
  </main>

    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const logoutBtn = document.getElementById("logoutBtn");
    const userEmail = document.getElementById("userEmail");

    const loginLangZh = document.getElementById("loginLangZh");
    const loginLangEn = document.getElementById("loginLangEn");
    const appLangZh = document.getElementById("appLangZh");
    const appLangEn = document.getElementById("appLangEn");

    const incomeForm = document.getElementById("incomeForm");
    const servicesContainer = document.getElementById("servicesContainer");
    const addServiceBtn = document.getElementById("addServiceBtn");
    const currencySelect = document.getElementById("currency");
    const paymentMethodSelect = document.getElementById("paymentMethod");
    const amountInput = document.getElementById("amount");
    const notesInput = document.getElementById("notes");
    const dateInput = document.getElementById("date");

    const recordsList = document.getElementById("recordsList");
    const monthFilter = document.getElementById("monthFilter");
    const currencyFilter = document.getElementById("currencyFilter");

    const monthGbp = document.getElementById("monthGbp");
    const monthHkd = document.getElementById("monthHkd");
    const popularService = document.getElementById("popularService");
    const popularServiceSub = document.getElementById("popularServiceSub");
    const topPayment = document.getElementById("topPayment");
    const topPaymentSub = document.getElementById("topPaymentSub");

    const formMessage = document.getElementById("formMessage");
    const formError = document.getElementById("formError");

    const formTitle = document.getElementById("formTitle");
    const editBanner = document.getElementById("editBanner");
    const saveBtn = document.getElementById("saveBtn");
    const cancelEditWrap = document.getElementById("cancelEditWrap");
    const normalButtonsWrap = document.getElementById("normalButtonsWrap");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const clearFormBtn = document.getElementById("clearFormBtn");
    const clearFormBtn2 = document.getElementById("clearFormBtn2");

    function t(key) {
      return translations[currentLang][key] || key;
    }

    function todayString() {
      const today = new Date();
      return today.toISOString().slice(0, 10);
    }

    function currentMonthString() {
      const today = new Date();
      return today.toISOString().slice(0, 7);
    }

    function getServiceByKey(key) {
      return SERVICE_OPTIONS.find(service => service.key === key);
    }

    function getServiceLabel(serviceObj) {
      if (!serviceObj) return "-";

      if (serviceObj.key) {
        const found = getServiceByKey(serviceObj.key);
        if (found) return found[currentLang];
      }

      if (currentLang === "zh") {
        return serviceObj.zh || serviceObj.name || serviceObj.en || "-";
      }

      return serviceObj.en || serviceObj.name || serviceObj.zh || "-";
    }

    function formatMoney(amount, currency) {
      const number = Number(amount || 0);

      if (currency === "GBP") {
        return "£" + number.toLocaleString("en-GB", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        });
      }

      if (currency === "HKD") {
        return "HK$" + number.toLocaleString("en-HK", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        });
      }

      return number.toString();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showMessage(element, message) {
      element.textContent = message;
      element.classList.remove("hidden");

      setTimeout(() => {
        element.classList.add("hidden");
      }, 3200);
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("estarotAdminLang", lang);
      applyLanguage();
      refreshServiceDropdownLabels();
      renderRecords();
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang === "zh" ? "zh-HK" : "en";

      document.getElementById("loginTitle").textContent = t("loginTitle");
      document.getElementById("loginSubtitle").textContent = t("loginSubtitle");
      document.querySelector('label[for="email"]').textContent = t("email");
      document.querySelector('label[for="password"]').textContent = t("password");
      document.getElementById("loginBtn").textContent = t("login");

      document.getElementById("mainTitle").textContent = t("mainTitle");
      logoutBtn.textContent = t("logout");

      document.getElementById("statGbpTitle").textContent = t("thisMonthGbp");
      document.getElementById("statHkdTitle").textContent = t("thisMonthHkd");
      document.getElementById("statMonthSub1").textContent = t("selectedMonth");
      document.getElementById("statMonthSub2").textContent = t("selectedMonth");
      document.getElementById("statPopularTitle").textContent = t("popularService");
      document.getElementById("statPaymentTitle").textContent = t("topPayment");

      document.getElementById("dateLabel").textContent = t("date");
      document.getElementById("serviceLabel").textContent = t("service");
      document.getElementById("currencyLabel").textContent = t("currency");
      document.getElementById("paymentMethodLabel").textContent = t("paymentMethod");
      document.getElementById("amountLabel").textContent = t("amount");
      document.getElementById("notesLabel").textContent = t("notes");
      document.getElementById("recordsTitle").textContent = t("records");
      document.getElementById("monthFilterLabel").textContent = t("monthFilter");
      document.getElementById("currencyFilterLabel").textContent = t("currencyFilter");
      document.getElementById("privacyNote").textContent = t("privacyNote");

      addServiceBtn.textContent = t("addService");
      cancelEditBtn.textContent = t("cancelEdit");
      clearFormBtn.textContent = t("clearForm");
      clearFormBtn2.textContent = t("clearForm");

      formTitle.textContent = editingRecordId ? t("formEditTitle") : t("formAddTitle");
      editBanner.textContent = t("editBanner");
      saveBtn.textContent = editingRecordId ? t("saveChanges") : t("save");

      loginLangZh.classList.toggle("active", currentLang === "zh");
      loginLangEn.classList.toggle("active", currentLang === "en");
      appLangZh.classList.toggle("active", currentLang === "zh");
      appLangEn.classList.toggle("active", currentLang === "en");

      popularServiceSub.textContent = t("popularSub");
      topPaymentSub.textContent = t("selectedMonth");
    }

    function updatePaymentMethods(selectedValue = null) {
      const currency = currencySelect.value;
      const methods = PAYMENT_METHODS[currency] || [];

      paymentMethodSelect.innerHTML = "";

      methods.forEach(method => {
        const option = document.createElement("option");
        option.value = method;
        option.textContent = method;
        if (selectedValue === method) option.selected = true;
        paymentMethodSelect.appendChild(option);
      });
    }

    function createServiceRow(serviceKey = "tarot_love", quantity = 1) {
      const row = document.createElement("div");
      row.className = "service-row";

      const select = document.createElement("select");
      select.className = "service-key";
      select.required = true;

      SERVICE_OPTIONS.forEach(service => {
        const option = document.createElement("option");
        option.value = service.key;
        option.dataset.zh = service.zh;
        option.dataset.en = service.en;
        option.textContent = service[currentLang];
        if (service.key === serviceKey) option.selected = true;
        select.appendChild(option);
      });

      const qty = document.createElement("input");
      qty.className = "service-quantity";
      qty.type = "number";
      qty.min = "1";
      qty.step = "1";
      qty.value = quantity;
      qty.required = true;

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "btn-danger";
      removeBtn.textContent = "×";
      removeBtn.addEventListener("click", () => {
        if (servicesContainer.children.length > 1) {
          row.remove();
        }
      });

      row.appendChild(select);
      row.appendChild(qty);
      row.appendChild(removeBtn);

      servicesContainer.appendChild(row);
    }

    function refreshServiceDropdownLabels() {
      document.querySelectorAll(".service-key option").forEach(option => {
        option.textContent = currentLang === "zh" ? option.dataset.zh : option.dataset.en;
      });
    }

    function normaliseExistingService(service) {
      if (service.key) {
        const found = getServiceByKey(service.key);
        if (found) {
          return {
            key: found.key,
            zh: found.zh,
            en: found.en,
            quantity: Number(service.quantity || 1)
          };
        }
      }

      const rawName = service.name || service.en || service.zh || "";
      const found = SERVICE_OPTIONS.find(item => {
        return item.en === rawName || item.zh === rawName || item.key === rawName;
      });

      if (found) {
        return {
          key: found.key,
          zh: found.zh,
          en: found.en,
          quantity: Number(service.quantity || 1)
        };
      }

      return {
        key: "other",
        zh: rawName || "其他",
        en: rawName || "Other",
        quantity: Number(service.quantity || 1)
      };
    }

    function getServicesFromForm() {
      const rows = servicesContainer.querySelectorAll(".service-row");

      return Array.from(rows).map(row => {
        const key = row.querySelector(".service-key").value;
        const quantity = Number(row.querySelector(".service-quantity").value || 1);
        const found = getServiceByKey(key);

        return {
          key,
          zh: found ? found.zh : "其他",
          en: found ? found.en : "Other",
          quantity
        };
      }).filter(service => service.key && service.quantity > 0);
    }

    function resetForm() {
      editingRecordId = null;
      incomeForm.reset();
      dateInput.value = todayString();
      servicesContainer.innerHTML = "";
      createServiceRow();
      currencySelect.value = "GBP";
      updatePaymentMethods();
      formError.classList.add("hidden");
      formMessage.classList.add("hidden");

      editBanner.classList.add("hidden");
      cancelEditWrap.classList.add("hidden");
      normalButtonsWrap.classList.remove("hidden");

      applyLanguage();
    }

    function enterEditMode(recordId) {
      const record = allRecords.find(item => item.id === recordId);
      if (!record) return;

      editingRecordId = recordId;

      dateInput.value = record.date || todayString();

      servicesContainer.innerHTML = "";
      const services = Array.isArray(record.services) && record.services.length
        ? record.services.map(normaliseExistingService)
        : [{ key: "tarot_love", quantity: 1 }];

      services.forEach(service => {
        createServiceRow(service.key || "other", Number(service.quantity || 1));
      });

      currencySelect.value = record.currency || "GBP";
      updatePaymentMethods(record.paymentMethod);
      amountInput.value = record.amount ?? "";
      notesInput.value = record.notes || "";

      editBanner.classList.remove("hidden");
      cancelEditWrap.classList.remove("hidden");
      normalButtonsWrap.classList.add("hidden");

      applyLanguage();

      document.querySelector("#incomeForm").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function filterRecords() {
      const selectedMonth = monthFilter.value;
      const selectedCurrency = currencyFilter.value;

      return allRecords.filter(record => {
        const matchMonth = !selectedMonth || record.date?.slice(0, 7) === selectedMonth;
        const matchCurrency = selectedCurrency === "ALL" || record.currency === selectedCurrency;

        return matchMonth && matchCurrency;
      });
    }

    function renderStats() {
      const selectedMonth = monthFilter.value || currentMonthString();

      const monthRecords = allRecords.filter(record => {
        return record.date?.slice(0, 7) === selectedMonth;
      });

      const gbpTotal = monthRecords
        .filter(record => record.currency === "GBP")
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);

      const hkdTotal = monthRecords
        .filter(record => record.currency === "HKD")
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);

      monthGbp.textContent = formatMoney(gbpTotal, "GBP");
      monthHkd.textContent = formatMoney(hkdTotal, "HKD");

      const serviceCount = {};
      const serviceLabelMap = {};
      const paymentCount = {};

      monthRecords.forEach(record => {
        if (Array.isArray(record.services)) {
          record.services.forEach(rawService => {
            const service = normaliseExistingService(rawService);
            const label = getServiceLabel(service);
            serviceCount[service.key] = (serviceCount[service.key] || 0) + Number(service.quantity || 1);
            serviceLabelMap[service.key] = label;
          });
        }

        if (record.paymentMethod) {
          paymentCount[record.paymentMethod] = (paymentCount[record.paymentMethod] || 0) + 1;
        }
      });

      const topService = Object.entries(serviceCount).sort((a, b) => b[1] - a[1])[0];
      const topMethod = Object.entries(paymentCount).sort((a, b) => b[1] - a[1])[0];

      if (topService) {
        popularService.textContent = serviceLabelMap[topService[0]] || topService[0];
        popularServiceSub.textContent = `${topService[1]} ${t("quantityCount")}`;
      } else {
        popularService.textContent = "-";
        popularServiceSub.textContent = t("noRecordThisMonth");
      }

      if (topMethod) {
        topPayment.textContent = topMethod[0];
        topPaymentSub.textContent = `${topMethod[1]} ${t("recordCount")}`;
      } else {
        topPayment.textContent = "-";
        topPaymentSub.textContent = t("noRecordThisMonth");
      }
    }

    function renderRecords() {
      const records = filterRecords();

      if (!records.length) {
        recordsList.innerHTML = `<div class="empty">${escapeHtml(t("noRecords"))}</div>`;
        renderStats();
        return;
      }

      recordsList.innerHTML = "";

      records.forEach(record => {
        const card = document.createElement("div");
        card.className = "record";

        const serviceTags = Array.isArray(record.services)
          ? record.services.map(rawService => {
              const service = normaliseExistingService(rawService);
              return `<span class="tag">${escapeHtml(getServiceLabel(service))} × ${Number(service.quantity || 1)}</span>`;
            }).join("")
          : "";

        card.innerHTML = `
          <div class="record-head">
            <div>
              <div class="record-date">${escapeHtml(record.date || "-")}</div>
              <div class="record-meta">${escapeHtml(record.paymentMethod || "-")} · ${escapeHtml(record.currency || "-")}</div>
            </div>
            <div>
              <div class="record-amount">${formatMoney(record.amount, record.currency)}</div>
            </div>
          </div>

          <div class="tags">${serviceTags}</div>

          ${record.notes ? `<div class="notes">${escapeHtml(record.notes)}</div>` : ""}

          <div class="record-actions">
            <button class="btn-edit btn-small" data-edit-id="${record.id}">${escapeHtml(t("edit"))}</button>
            <button class="btn-danger btn-small" data-delete-id="${record.id}">${escapeHtml(t("delete"))}</button>
          </div>
        `;

        recordsList.appendChild(card);
      });

      recordsList.querySelectorAll("[data-edit-id]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-edit-id");
          enterEditMode(id);
        });
      });

      recordsList.querySelectorAll("[data-delete-id]").forEach(button => {
        button.addEventListener("click", async () => {
          const id = button.getAttribute("data-delete-id");

          const confirmed = confirm(t("deleteConfirm"));
          if (!confirmed) return;

          try {
            await deleteDoc(doc(db, "incomeRecords", id));

            if (editingRecordId === id) {
              resetForm();
            }
          } catch (error) {
            alert(t("deleteError") + error.message);
          }
        });
      });

      renderStats();
    }

    loginLangZh.addEventListener("click", () => setLanguage("zh"));
    loginLangEn.addEventListener("click", () => setLanguage("en"));
    appLangZh.addEventListener("click", () => setLanguage("zh"));
    appLangEn.addEventListener("click", () => setLanguage("en"));

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      loginError.classList.add("hidden");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        loginError.textContent = t("loginError");
        loginError.classList.remove("hidden");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    addServiceBtn.addEventListener("click", () => {
      createServiceRow();
    });

    currencySelect.addEventListener("change", () => {
      updatePaymentMethods();
    });

    clearFormBtn.addEventListener("click", resetForm);
    clearFormBtn2.addEventListener("click", resetForm);
    cancelEditBtn.addEventListener("click", resetForm);

    incomeForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      formError.classList.add("hidden");
      formMessage.classList.add("hidden");

      const date = dateInput.value;
      const services = getServicesFromForm();
      const currency = currencySelect.value;
      const paymentMethod = paymentMethodSelect.value;
      const amount = Number(amountInput.value);
      const notes = notesInput.value.trim();

      if (!date || !services.length || !currency || !paymentMethod || !amount) {
        showMessage(formError, t("requiredError"));
        return;
      }

      const payload = {
        date,
        services,
        currency,
        paymentMethod,
        amount,
        notes,
        updatedAt: serverTimestamp()
      };

      try {
        if (editingRecordId) {
          await updateDoc(doc(db, "incomeRecords", editingRecordId), payload);
          showMessage(formMessage, t("updateSuccess"));
        } else {
          await addDoc(collection(db, "incomeRecords"), {
            ...payload,
            createdAt: serverTimestamp()
          });
          showMessage(formMessage, t("saveSuccess"));
        }

        resetForm();
      } catch (error) {
        if (editingRecordId) {
          showMessage(formError, t("updateError") + error.message);
        } else {
          showMessage(formError, t("saveError") + error.message);
        }
      }
    });

    monthFilter.addEventListener("change", renderRecords);
    currencyFilter.addEventListener("change", renderRecords);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.classList.add("hidden");
        appScreen.classList.remove("hidden");
        userEmail.textContent = `${t("loggedInAs")}${user.email}`;

        if (!monthFilter.value) {
          monthFilter.value = currentMonthString();
        }

        resetForm();

        if (unsubscribeRecords) unsubscribeRecords();

        const recordsQuery = query(
          collection(db, "incomeRecords"),
          orderBy("date", "desc")
        );

        unsubscribeRecords = onSnapshot(recordsQuery, (snapshot) => {
          allRecords = snapshot.docs.map(docSnap => ({
            id: docSnap.id,
            ...docSnap.data()
          }));

          renderRecords();
        }, (error) => {
          recordsList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        });

      } else {
        appScreen.classList.add("hidden");
        loginScreen.classList.remove("hidden");
        userEmail.textContent = "";

        if (unsubscribeRecords) {
          unsubscribeRecords();
          unsubscribeRecords = null;
        }
      }

      applyLanguage();
    });

    applyLanguage();
    updatePaymentMethods();
  </script>

</body>
</html>
