<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Estarot Admin</title>

  <style>
    :root {
      --bg: #120818;
      --card: #1f102b;
      --gold: #d8b26e;
      --soft-gold: #f1d9a5;
      --text: #fff8ee;
      --muted: #c8b8d1;
      --danger: #ff6b6b;
      --success: #9be7c5;
      --border: rgba(216,178,110,0.35);
      --shadow: 0 18px 45px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(216,178,110,0.22), transparent 35%),
        linear-gradient(180deg, #120818 0%, #1b0c24 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
      padding: 28px 0 80px;
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: min(420px, 100%);
      background: rgba(31,16,43,0.96);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand .moon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h1, h2, h3 { margin: 0; }

    .brand h1 {
      color: var(--soft-gold);
      font-size: 28px;
      letter-spacing: 0.5px;
    }

    .brand p {
      color: var(--muted);
      margin: 8px 0 0;
      font-size: 14px;
    }

    .lang-switch {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 18px 0 8px;
    }

    .lang-btn, .tab-btn {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      width: auto;
    }

    .lang-btn.active,
    .tab-btn.active {
      background: linear-gradient(135deg, #d8b26e, #fff0bf);
      color: #241225;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      color: var(--soft-gold);
      font-weight: 600;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216,178,110,0.13);
    }

    select option,
    select optgroup {
      background: #1f102b;
      color: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input[type="date"],
    input[type="month"] {
      -webkit-appearance: none;
      appearance: none;
      text-align: left;
      line-height: normal;
      min-height: 48px;
      display: block;
    }

    input[type="date"]::-webkit-date-and-time-value,
    input[type="month"]::-webkit-date-and-time-value {
      text-align: left;
      display: block;
      width: 100%;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #d8b26e, #fff0bf);
      color: #241225;
      width: 100%;
      margin-top: 18px;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.13);
    }

    .btn-danger {
      background: rgba(255,107,107,0.14);
      color: #ffb1b1;
      border: 1px solid rgba(255,107,107,0.3);
    }

    .btn-edit {
      background: rgba(216,178,110,0.13);
      color: #ffe7ad;
      border: 1px solid rgba(216,178,110,0.28);
    }

    .btn-small {
      padding: 9px 12px;
      font-size: 13px;
    }

    .button-row,
    .export-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .export-row {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .error {
      color: #ffb1b1;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      color: var(--success);
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar h1 {
      color: var(--soft-gold);
      font-size: clamp(24px, 5vw, 38px);
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .page-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .stats-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 20px;
    }

    .card {
      background: rgba(31,16,43,0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .stat-card h3 {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 25px;
      color: var(--soft-gold);
      font-weight: 800;
      word-break: break-word;
    }

    .stat-card .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .main-grid {
      grid-template-columns: 0.9fr 1.1fr;
      align-items: start;
    }

    .section-title {
      color: var(--soft-gold);
      margin-bottom: 16px;
      font-size: 21px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .service-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 42px;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    .service-row button {
      border-radius: 14px;
      height: 47px;
      padding: 0;
    }

    .service-custom {
      grid-column: 1 / -1;
      margin-top: 8px;
    }

    .service-custom.hidden { display: none; }

    .filter-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    .filter-bar > div { min-width: 0; }

    .records {
      display: grid;
      gap: 12px;
      max-height: 680px;
      overflow: auto;
      padding-right: 4px;
    }

    .record {
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 15px;
    }

    .record-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .record-date {
      color: var(--soft-gold);
      font-weight: 800;
    }

    .record-amount {
      font-size: 20px;
      font-weight: 900;
      color: #fff2bf;
      text-align: right;
    }

    .record-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .record-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      background: rgba(216,178,110,0.13);
      border: 1px solid rgba(216,178,110,0.25);
      color: #ffe7ad;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .notes {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 10px;
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .edit-banner {
      background: rgba(216,178,110,0.12);
      border: 1px solid rgba(216,178,110,0.28);
      color: #ffe7ad;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .tarot-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: start;
    }

    .tarot-card-display {
      min-height: 460px;
      border: 1px dashed rgba(216,178,110,0.35);
      border-radius: 22px;
      padding: 20px;
      background: rgba(255,255,255,0.045);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .tarot-image {
      width: min(260px, 100%);
      max-height: 360px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.45);
      margin-bottom: 18px;
      background: rgba(255,255,255,0.06);
    }

    .tarot-card-name {
      font-size: 28px;
      color: var(--soft-gold);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .tarot-card-en {
      color: var(--muted);
      font-size: 16px;
    }

    .tarot-count {
      color: var(--muted);
      font-size: 14px;
      margin-top: 14px;
      line-height: 1.7;
      text-align: center;
    }

    .tarot-history {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-height: 720px;
  overflow: auto;
  direction: ltr;
}

.tarot-history-item {
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  min-width: 0;
}

.tarot-history-thumb {
  width: 100%;
  max-width: 90px;
  height: 135px;
  object-fit: cover;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  margin: 0 auto 10px;
  display: block;
}

.tarot-history-item strong {
  color: var(--soft-gold);
  display: block;
  margin-bottom: 4px;
  font-size: 14px;
  line-height: 1.35;
}

.tarot-history-item .record-meta {
  font-size: 12px;
  line-height: 1.35;
}

@media (max-width: 540px) {
  .tarot-history {
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .tarot-history-item {
    padding: 8px;
  }

  .tarot-history-thumb {
    max-width: 72px;
    height: 108px;
  }

  .tarot-history-item strong {
    font-size: 12px;
  }

  .tarot-history-item .record-meta {
    font-size: 11px;
  }
}

    @media (max-width: 880px) {
      .stats-grid,
      .main-grid,
      .tarot-layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .top-actions .btn-secondary { flex: 1; }
    }

    @media (max-width: 540px) {
      .container {
        width: 94%;
        padding-top: 20px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .login-card { padding: 24px; }

      .row,
      .filter-bar,
      .export-row,
      .button-row {
        grid-template-columns: 1fr;
      }

      .service-row {
        grid-template-columns: minmax(0, 1fr) 70px 38px;
      }

      .record-head { flex-direction: column; }
      .record-amount { text-align: left; }

      .tarot-card-display { min-height: 420px; }
      .tarot-image { max-height: 310px; }
    }
  </style>
</head>

<body>

  <section id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="moon">🌙</div>
        <h1 id="loginTitle">Estarot Admin</h1>
        <p id="loginSubtitle">Admin Page</p>

        <div class="lang-switch">
          <button type="button" id="loginLangZh" class="lang-btn">繁中</button>
          <button type="button" id="loginLangEn" class="lang-btn">EN</button>
        </div>
      </div>

      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button id="loginBtn" class="btn-primary" type="submit">登入</button>

        <div id="loginError" class="error hidden"></div>
      </form>
    </div>
  </section>

  <main id="appScreen" class="container hidden">

    <div class="topbar">
      <div>
        <h1 id="mainTitle">收入記錄</h1>
        <p id="userEmail">Logged in</p>
      </div>

      <div class="top-actions">
        <button type="button" id="appLangZh" class="lang-btn">繁中</button>
        <button type="button" id="appLangEn" class="lang-btn">EN</button>
        <button id="logoutBtn" class="btn-secondary">登出</button>
      </div>
    </div>

    <div class="page-tabs">
      <button type="button" id="incomeTabBtn" class="tab-btn active">收入記錄</button>
      <button type="button" id="tarotTabBtn" class="tab-btn">塔羅抽牌</button>
    </div>

    <div id="incomePage">

      <section class="grid stats-grid">
        <div class="card stat-card">
          <h3 id="statGbpTitle">本月 GBP</h3>
          <div id="monthGbp" class="value">£0</div>
          <div id="statMonthSub1" class="sub">所選月份</div>
        </div>

        <div class="card stat-card">
          <h3 id="statHkdTitle">本月 HKD</h3>
          <div id="monthHkd" class="value">HK$0</div>
          <div id="statMonthSub2" class="sub">所選月份</div>
        </div>

        <div class="card stat-card">
          <h3 id="statYearGbpTitle">全年 GBP</h3>
          <div id="yearGbp" class="value">£0</div>
          <div id="statYearSub1" class="sub">4月開始計算</div>
        </div>

        <div class="card stat-card">
          <h3 id="statYearHkdTitle">全年 HKD</h3>
          <div id="yearHkd" class="value">HK$0</div>
          <div id="statYearSub2" class="sub">4月開始計算</div>
        </div>

        <div class="card stat-card">
          <h3 id="statPopularTitle">最受歡迎服務</h3>
          <div id="popularService" class="value">-</div>
          <div id="popularServiceSub" class="sub">按數量計算</div>
        </div>

        <div class="card stat-card">
          <h3 id="statPaymentTitle">最常用收款方式</h3>
          <div id="topPayment" class="value">-</div>
          <div id="topPaymentSub" class="sub">所選月份</div>
        </div>
      </section>

      <section class="grid main-grid">

        <div class="card">
          <h2 id="formTitle" class="section-title">新增收入</h2>

          <div id="editBanner" class="edit-banner hidden"></div>

          <form id="incomeForm">

            <label for="date" id="dateLabel">收款日期</label>
            <input id="date" type="date" required />

            <label id="serviceLabel">服務內容</label>
            <div id="servicesContainer"></div>

            <button id="addServiceBtn" type="button" class="btn-secondary btn-small">+ 新增服務</button>

            <div class="row">
              <div>
                <label for="currency" id="currencyLabel">貨幣</label>
                <select id="currency" required>
                  <option value="GBP">GBP</option>
                  <option value="HKD">HKD</option>
                </select>
              </div>

              <div>
                <label for="paymentMethod" id="paymentMethodLabel">收款方式</label>
                <select id="paymentMethod" required></select>
              </div>
            </div>

            <label for="amount" id="amountLabel">金額</label>
            <input id="amount" type="number" step="0.01" min="0" placeholder="例如：35" required />

            <label for="notes" id="notesLabel">備註 Optional</label>
            <textarea id="notes" placeholder="例如：IG booking / package / special note"></textarea>

            <button id="saveBtn" class="btn-primary" type="submit">儲存紀錄</button>

            <div id="cancelEditWrap" class="button-row hidden">
              <button id="cancelEditBtn" type="button" class="btn-secondary">取消更改</button>
              <button id="clearFormBtn" type="button" class="btn-secondary">清空表格</button>
            </div>

            <div id="normalButtonsWrap">
              <button id="clearFormBtn2" type="button" class="btn-secondary" style="width:100%; margin-top:10px;">清空表格</button>
            </div>

            <div id="formMessage" class="success hidden"></div>
            <div id="formError" class="error hidden"></div>
          </form>

          <p id="privacyNote" class="footer-note">
            建議只記收入資料，不記客戶姓名或敏感內容，保障私隱。
          </p>
        </div>

        <div class="card">
          <h2 id="recordsTitle" class="section-title">收入紀錄</h2>

          <div class="filter-bar">
            <div>
              <label for="monthFilter" id="monthFilterLabel">月份篩選</label>
              <input id="monthFilter" type="month" />
            </div>

            <div>
              <label for="currencyFilter" id="currencyFilterLabel">貨幣篩選</label>
              <select id="currencyFilter">
                <option value="ALL">All</option>
                <option value="GBP">GBP</option>
                <option value="HKD">HKD</option>
              </select>
            </div>
          </div>

          <div class="export-row">
            <button id="exportExcelBtn" type="button" class="btn-edit btn-small">匯出 Excel</button>
            <button id="exportCsvBtn" type="button" class="btn-secondary btn-small">匯出 CSV</button>
          </div>

          <div id="recordsList" class="records">
            <div class="empty">Loading records...</div>
          </div>
        </div>

      </section>
    </div>

    <div id="tarotPage" class="hidden">
      <section class="tarot-layout">
        <div class="card">
          <h2 id="tarotTitle" class="section-title">塔羅抽牌</h2>

          <div id="tarotCardDisplay" class="tarot-card-display">
            <div>
              <div class="tarot-card-name">尚未抽牌</div>
              <div class="tarot-card-en">Press the button to draw a card</div>
            </div>
          </div>

          <button id="drawTarotBtn" type="button" class="btn-primary">抽一張牌</button>

          <div class="button-row">
            <button id="shuffleTarotBtn" type="button" class="btn-secondary">洗牌</button>
            <button id="clearCurrentTarotBtn" type="button" class="btn-secondary">隱藏目前牌面</button>
          </div>

          <div id="tarotCount" class="tarot-count">
            已抽：0 張｜剩餘：78 張
          </div>
        </div>

        <div class="card">
          <h2 id="tarotHistoryTitle" class="section-title">已抽牌紀錄</h2>
          <div id="tarotHistory" class="tarot-history">
            <div class="empty">未有抽牌紀錄。</div>
          </div>
        </div>
      </section>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    function todayString() {

      const today = new Date();

    function getFinancialYearRange() {
      const today = new Date();
      const currentYear = today.getFullYear();
      const currentMonth = today.getMonth() + 1;

      let startYear;
      let endYear;

      if (currentMonth >= 4) {
        startYear = currentYear;
        endYear = currentYear + 1;
      } else {
        startYear = currentYear - 1;
        endYear = currentYear;
      }

      return {
        start: `${startYear}-04-01`,
        end: `${endYear}-03-31`
      };
    }

    function isDateInFinancialYear(dateString) {
      if (!dateString) return false;
      const range = getFinancialYearRange();
      return dateString >= range.start && dateString <= range.end;
    }

        const category = currentLang === "zh" ? found.categoryZh : found.categoryEn;
        const item = currentLang === "zh" ? found.zh : found.en;
        return `${category} - ${item}`;
      }

      return serviceObj.name || serviceObj.zh || serviceObj.en || "-";
    }

    function formatMoney(amount, currency) {
      const number = Number(amount || 0);

      if (currency === "GBP") {
        return "£" + number.toLocaleString("en-GB", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        });
      }

      if (currency === "HKD") {
        return "HK$" + number.toLocaleString("en-HK", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        });
      }

      return number.toString();
    }

    function createServiceRow(serviceKey = "tarot_love_analysis", quantity = 1, customName = "") {
      const row = document.createElement("div");
      row.className = "service-row";

      const select = document.createElement("select");
      select.className = "service-key";
      select.required = true;

      SERVICE_GROUPS.forEach(group => {
        const optgroup = document.createElement("optgroup");
        optgroup.label = currentLang === "zh" ? group.zh : group.en;
        optgroup.dataset.zh = group.zh;
        optgroup.dataset.en = group.en;

        group.items.forEach(item => {
          const option = document.createElement("option");
          option.value = item.key;
          option.dataset.zh = item.zh;
          option.dataset.en = item.en;
          option.textContent = item[currentLang];

          if (item.key === serviceKey) option.selected = true;

          optgroup.appendChild(option);
        });

        select.appendChild(optgroup);
      });

      const qty = document.createElement("input");
      qty.className = "service-quantity";
      qty.type = "number";
      qty.min = "1";
      qty.step = "1";
      qty.value = quantity;
      qty.required = true;

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "btn-danger";
      removeBtn.textContent = "×";
      removeBtn.addEventListener("click", () => {
        if (servicesContainer.children.length > 1) row.remove();
      });

      const customInput = document.createElement("input");
      customInput.className = "service-custom hidden";
      customInput.type = "text";
      customInput.placeholder = t("otherPlaceholder");
      customInput.value = customName || "";

      function toggleCustomInput() {
        if (select.value === "other") {
          customInput.classList.remove("hidden");
        } else {
          customInput.classList.add("hidden");
          customInput.value = "";
        }
      }

      select.addEventListener("change", toggleCustomInput);

      row.appendChild(select);
      row.appendChild(qty);
      row.appendChild(removeBtn);
      row.appendChild(customInput);

      servicesContainer.appendChild(row);

      toggleCustomInput();
    }

      const rawName = service.name || service.en || service.zh || "";

      const found = SERVICE_OPTIONS.find(item => {
        return item.en === rawName || item.zh === rawName || item.key === rawName;
      });

      if (found) {
        return {
          key: found.key,
          zh: found.zh,
          en: found.en,
          categoryZh: found.categoryZh,
          categoryEn: found.categoryEn,
          customName: service.customName || "",
          quantity: Number(service.quantity || 1)
        };
      }

      return {
        key: "other",
        zh: "其他（請說明）",
        en: "Other - Please specify",
        categoryZh: "其他",
        categoryEn: "Other",
        customName: rawName || service.customName || "",
        quantity: Number(service.quantity || 1)
      };
    }

    function getServicesFromForm() {
      const rows = servicesContainer.querySelectorAll(".service-row");

      return Array.from(rows).map(row => {
        const key = row.querySelector(".service-key").value;
        const quantity = Number(row.querySelector(".service-quantity").value || 1);
        const customName = row.querySelector(".service-custom")?.value.trim() || "";
        const found = getServiceByKey(key);

        return {
          key,
          zh: found ? found.zh : "其他（請說明）",
          en: found ? found.en : "Other - Please specify",
          categoryZh: found ? found.categoryZh : "其他",
          categoryEn: found ? found.categoryEn : "Other",
          customName,
          quantity
        };
      }).filter(service => {
        if (!service.key || service.quantity <= 0) return false;
        if (service.key === "other" && !service.customName) return false;
        return true;
      });
    }

    function resetForm() {
      editingRecordId = null;
      incomeForm.reset();
      dateInput.value = todayString();
      servicesContainer.innerHTML = "";
      createServiceRow();
      currencySelect.value = "GBP";
      updatePaymentMethods();
      formError.classList.add("hidden");
      formMessage.classList.add("hidden");

      editBanner.classList.add("hidden");
      cancelEditWrap.classList.add("hidden");
      normalButtonsWrap.classList.remove("hidden");

      applyLanguage();
    }

    function enterEditMode(recordId) {
      const record = allRecords.find(item => item.id === recordId);
      if (!record) return;

      editingRecordId = recordId;

      dateInput.value = record.date || todayString();

      servicesContainer.innerHTML = "";
      const services = Array.isArray(record.services) && record.services.length
        ? record.services.map(normaliseExistingService)
        : [{ key: "tarot_love_analysis", quantity: 1 }];

      services.forEach(service => {
        createServiceRow(
          service.key || "other",
          Number(service.quantity || 1),
          service.customName || ""
        );
      });

      currencySelect.value = record.currency || "GBP";
      updatePaymentMethods(record.paymentMethod);
      amountInput.value = record.amount ?? "";
      notesInput.value = record.notes || "";

      editBanner.classList.remove("hidden");
      cancelEditWrap.classList.remove("hidden");
      normalButtonsWrap.classList.add("hidden");

      applyLanguage();

      document.querySelector("#incomeForm").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function filterRecords() {
      const selectedMonth = monthFilter.value;
      const selectedCurrency = currencyFilter.value;

      return allRecords.filter(record => {
        const matchMonth = !selectedMonth || record.date?.slice(0, 7) === selectedMonth;
        const matchCurrency = selectedCurrency === "ALL" || record.currency === selectedCurrency;

        return matchMonth && matchCurrency;
      });
    }

    function renderStats() {
      const selectedMonth = monthFilter.value || currentMonthString();

      const monthRecords = allRecords.filter(record => {
        return record.date?.slice(0, 7) === selectedMonth;
      });

      const gbpTotal = monthRecords
        .filter(record => record.currency === "GBP")
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);

      const hkdTotal = monthRecords
        .filter(record => record.currency === "HKD")
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);

      monthGbp.textContent = formatMoney(gbpTotal, "GBP");
      monthHkd.textContent = formatMoney(hkdTotal, "HKD");

      const yearRecords = allRecords.filter(record => isDateInFinancialYear(record.date));

      const yearGbpTotal = yearRecords
        .filter(record => record.currency === "GBP")
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);

      const yearHkdTotal = yearRecords
        .filter(record => record.currency === "HKD")
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);

      yearGbp.textContent = formatMoney(yearGbpTotal, "GBP");
      yearHkd.textContent = formatMoney(yearHkdTotal, "HKD");

      const serviceCount = {};
      const serviceLabelMap = {};
      const paymentCount = {};

      monthRecords.forEach(record => {
        if (Array.isArray(record.services)) {
          record.services.forEach(rawService => {
            const service = normaliseExistingService(rawService);
            const label = getServiceLabel(service);
            const key = service.key + (service.customName || "");

            serviceCount[key] = (serviceCount[key] || 0) + Number(service.quantity || 1);
            serviceLabelMap[key] = label;
          });
        }

        if (record.paymentMethod) {
          paymentCount[record.paymentMethod] = (paymentCount[record.paymentMethod] || 0) + 1;
        }
      });

      const topService = Object.entries(serviceCount).sort((a, b) => b[1] - a[1])[0];
      const topMethod = Object.entries(paymentCount).sort((a, b) => b[1] - a[1])[0];

      if (topService) {
        popularService.textContent = serviceLabelMap[topService[0]] || topService[0];
        popularServiceSub.textContent = `${topService[1]} ${t("quantityCount")}`;
      } else {
        popularService.textContent = "-";
        popularServiceSub.textContent = t("noRecordThisMonth");
      }

      if (topMethod) {
        topPayment.textContent = topMethod[0];
        topPaymentSub.textContent = `${topMethod[1]} ${t("recordCount")}`;
      } else {
        topPayment.textContent = "-";
        topPaymentSub.textContent = t("noRecordThisMonth");
      }
    }

    function renderRecords() {
      const records = filterRecords();

      if (!records.length) {
        recordsList.innerHTML = `<div class="empty">${escapeHtml(t("noRecords"))}</div>`;
        renderStats();
        return;
      }

      recordsList.innerHTML = "";

      records.forEach(record => {
        const card = document.createElement("div");
        card.className = "record";

        const serviceTags = Array.isArray(record.services)
          ? record.services.map(rawService => {
              const service = normaliseExistingService(rawService);
              return `<span class="tag">${escapeHtml(getServiceLabel(service))} × ${Number(service.quantity || 1)}</span>`;
            }).join("")
          : "";

        card.innerHTML = `
          <div class="record-head">
            <div>
              <div class="record-date">${escapeHtml(record.date || "-")}</div>
              <div class="record-meta">${escapeHtml(record.paymentMethod || "-")} · ${escapeHtml(record.currency || "-")}</div>
            </div>
            <div>
              <div class="record-amount">${formatMoney(record.amount, record.currency)}</div>
            </div>
          </div>

          <div class="tags">${serviceTags}</div>

          ${record.notes ? `<div class="notes">${escapeHtml(record.notes)}</div>` : ""}

          <div class="record-actions">
            <button class="btn-edit btn-small" data-edit-id="${record.id}">${escapeHtml(t("edit"))}</button>
            <button class="btn-danger btn-small" data-delete-id="${record.id}">${escapeHtml(t("delete"))}</button>
          </div>
        `;

        recordsList.appendChild(card);
      });

      recordsList.querySelectorAll("[data-edit-id]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-edit-id");
          enterEditMode(id);
        });
      });

      recordsList.querySelectorAll("[data-delete-id]").forEach(button => {
        button.addEventListener("click", async () => {
          const id = button.getAttribute("data-delete-id");

          const confirmed = confirm(t("deleteConfirm"));
          if (!confirmed) return;

          try {
            await deleteDoc(doc(db, "incomeRecords", id));
            if (editingRecordId === id) resetForm();
          } catch (error) {
            alert(t("deleteError") + error.message);
          }
        });
      });

      renderStats();
    }

    function getExportRows() {
      const records = filterRecords();
      const rows = [];

      records.forEach(record => {
        const services = Array.isArray(record.services) && record.services.length
          ? record.services.map(normaliseExistingService)
          : [];

        if (!services.length) {
          rows.push({
            date: record.date || "",
            currency: record.currency || "",
            amount: Number(record.amount || 0),
            paymentMethod: record.paymentMethod || "",
            serviceCategoryZh: "",
            serviceItemZh: "",
            serviceFullZh: "",
            serviceCategoryEn: "",
            serviceItemEn: "",
            serviceFullEn: "",
            quantity: "",
            notes: record.notes || ""
          });
          return;
        }

        services.forEach(service => {
          const found = getServiceByKey(service.key);

          const categoryZh = service.key === "other" ? "其他" : found?.categoryZh || service.categoryZh || "";
          const categoryEn = service.key === "other" ? "Other" : found?.categoryEn || service.categoryEn || "";
          const itemZh = service.key === "other" ? (service.customName || "其他") : found?.zh || service.zh || "";
          const itemEn = service.key === "other" ? (service.customName || "Other") : found?.en || service.en || "";

          rows.push({
            date: record.date || "",
            currency: record.currency || "",
            amount: Number(record.amount || 0),
            paymentMethod: record.paymentMethod || "",
            serviceCategoryZh: categoryZh,
            serviceItemZh: itemZh,
            serviceFullZh: `${categoryZh} - ${itemZh}`,
            serviceCategoryEn: categoryEn,
            serviceItemEn: itemEn,
            serviceFullEn: `${categoryEn} - ${itemEn}`,
            quantity: Number(service.quantity || 1),
            notes: record.notes || ""
          });
        });
      });

      return rows;
    }

    function getExportFilename(extension) {
      const month = monthFilter.value || "all-months";
      const currency = currencyFilter.value === "ALL" ? "all-currencies" : currencyFilter.value;
      return `estarot-income-${month}-${currency}.${extension}`;
    }

    function downloadBlob(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();

      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function exportCsv() {
      const rows = getExportRows();

      if (!rows.length) {
        alert(t("exportNoRecords"));
        return;
      }

      const headers = [
        "Date", "Currency", "Amount", "Payment Method",
        "Service Category ZH", "Service Item ZH", "Service Full ZH",
        "Service Category EN", "Service Item EN", "Service Full EN",
        "Quantity", "Notes"
      ];

      const csvRows = [
        headers,
        ...rows.map(row => [
          row.date, row.currency, row.amount, row.paymentMethod,
          row.serviceCategoryZh, row.serviceItemZh, row.serviceFullZh,
          row.serviceCategoryEn, row.serviceItemEn, row.serviceFullEn,
          row.quantity, row.notes
        ])
      ];

      const csvContent = "\uFEFF" + csvRows.map(row =>
        row.map(value => {
          const safeValue = String(value ?? "").replaceAll('"', '""');
          return `"${safeValue}"`;
        }).join(",")
      ).join("\n");

      downloadBlob(csvContent, getExportFilename("csv"), "text/csv;charset=utf-8;");
    }

    function exportExcel() {
      const rows = getExportRows();

      if (!rows.length) {
        alert(t("exportNoRecords"));
        return;
      }

      if (typeof XLSX === "undefined") {
        alert("Excel export library is still loading. Please try again in a few seconds.");
        return;
      }

      const worksheetData = rows.map(row => ({
        "Date": row.date,
        "Currency": row.currency,
        "Amount": row.amount,
        "Payment Method": row.paymentMethod,
        "Service Category ZH": row.serviceCategoryZh,
        "Service Item ZH": row.serviceItemZh,
        "Service Full ZH": row.serviceFullZh,
        "Service Category EN": row.serviceCategoryEn,
        "Service Item EN": row.serviceItemEn,
        "Service Full EN": row.serviceFullEn,
        "Quantity": row.quantity,
        "Notes": row.notes
      }));

      const worksheet = XLSX.utils.json_to_sheet(worksheetData);

      worksheet["!cols"] = [
        { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 18 },
        { wch: 20 }, { wch: 22 }, { wch: 34 },
        { wch: 26 }, { wch: 26 }, { wch: 42 },
        { wch: 10 }, { wch: 34 }
      ];

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Income Records");
      XLSX.writeFile(workbook, getExportFilename("xlsx"));
    }

    function saveTarotState() {
      localStorage.setItem("estarotDrawnTarotCards", JSON.stringify(drawnTarotCards));
      localStorage.setItem("estarotCurrentTarotCard", JSON.stringify(currentTarotCard));
    }

    function getRemainingTarotCards() {
      const drawnIds = drawnTarotCards.map(card => card.id);
      return TAROT_DECK.filter(card => !drawnIds.includes(card.id));
    }

    function renderTarotCard() {
      if (!currentTarotCard) {
        tarotCardDisplay.innerHTML = `
          <div>
            <div class="tarot-card-name">${escapeHtml(t("noCard"))}</div>
            <div class="tarot-card-en">${escapeHtml(t("pressDraw"))}</div>
          </div>
        `;
      } else {
        tarotCardDisplay.innerHTML = `
          <div>
            <img class="tarot-image" src="${escapeHtml(currentTarotCard.img)}" alt="${escapeHtml(currentTarotCard.en)}">
            <div class="tarot-card-name">${escapeHtml(currentLang === "zh" ? currentTarotCard.zh : currentTarotCard.en)}</div>
            <div class="tarot-card-en">${escapeHtml(currentLang === "zh" ? currentTarotCard.en : currentTarotCard.zh)}</div>
          </div>
        `;
      }

      const remaining = getRemainingTarotCards().length;

      tarotCount.textContent = currentLang === "zh"
        ? `${t("drawn")}：${drawnTarotCards.length} ${t("cards")}｜${t("remaining")}：${remaining} ${t("cards")}`
        : `${t("drawn")}: ${drawnTarotCards.length} ${t("cards")} | ${t("remaining")}: ${remaining} ${t("cards")}`;

      renderTarotHistory();
    }

    function renderTarotHistory() {
  if (!drawnTarotCards.length) {
    tarotHistory.innerHTML = `<div class="empty">${escapeHtml(t("tarotEmpty"))}</div>`;
    return;
  }

  tarotHistory.innerHTML = "";

  drawnTarotCards.forEach((card, index) => {
    const item = document.createElement("div");
    item.className = "tarot-history-item";

    const drawNumber = index + 1;

    item.innerHTML = `
      <img class="tarot-history-thumb" src="${escapeHtml(card.img)}" alt="${escapeHtml(card.en)}">
      <strong>#${drawNumber} ${escapeHtml(currentLang === "zh" ? card.zh : card.en)}</strong>
      <div class="record-meta">${escapeHtml(currentLang === "zh" ? card.en : card.zh)}</div>
    `;

    tarotHistory.appendChild(item);
  });
}

    function drawTarotCard() {
      const remainingCards = getRemainingTarotCards();

      if (!remainingCards.length) {
        alert(t("allDrawn"));
        return;
      }

      const randomIndex = Math.floor(Math.random() * remainingCards.length);
      const selectedCard = remainingCards[randomIndex];

      currentTarotCard = selectedCard;
      drawnTarotCards.push(selectedCard);

      saveTarotState();
      renderTarotCard();
    }

    function shuffleTarotDeck() {
      const confirmed = confirm(t("shuffleConfirm"));
      if (!confirmed) return;

      drawnTarotCards = [];
      currentTarotCard = null;

      saveTarotState();
      renderTarotCard();
    }

    function hideCurrentTarotCard() {
      currentTarotCard = null;
      saveTarotState();
      renderTarotCard();
    }

    function showIncomePage() {
      incomePage.classList.remove("hidden");
      tarotPage.classList.add("hidden");

      incomeTabBtn.classList.add("active");
      tarotTabBtn.classList.remove("active");

      document.getElementById("mainTitle").textContent = t("mainTitle");
    }

    function showTarotPage() {
      incomePage.classList.add("hidden");
      tarotPage.classList.remove("hidden");

      incomeTabBtn.classList.remove("active");
      tarotTabBtn.classList.add("active");

      document.getElementById("mainTitle").textContent = t("tarotTitle");
      renderTarotCard();
    }

    loginLangZh.addEventListener("click", () => setLanguage("zh"));
    loginLangEn.addEventListener("click", () => setLanguage("en"));
    appLangZh.addEventListener("click", () => setLanguage("zh"));
    appLangEn.addEventListener("click", () => setLanguage("en"));

    incomeTabBtn.addEventListener("click", showIncomePage);
    tarotTabBtn.addEventListener("click", showTarotPage);

    drawTarotBtn.addEventListener("click", drawTarotCard);
    shuffleTarotBtn.addEventListener("click", shuffleTarotDeck);
    clearCurrentTarotBtn.addEventListener("click", hideCurrentTarotCard);

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      loginError.classList.add("hidden");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        loginError.textContent = t("loginError");
        loginError.classList.remove("hidden");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    addServiceBtn.addEventListener("click", () => {
      createServiceRow();
    });

    currencySelect.addEventListener("change", () => {
      updatePaymentMethods();
    });

    clearFormBtn.addEventListener("click", resetForm);
    clearFormBtn2.addEventListener("click", resetForm);
    cancelEditBtn.addEventListener("click", resetForm);

    exportExcelBtn.addEventListener("click", exportExcel);
    exportCsvBtn.addEventListener("click", exportCsv);

    incomeForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      formError.classList.add("hidden");
      formMessage.classList.add("hidden");

      const date = dateInput.value;
      const services = getServicesFromForm();
      const currency = currencySelect.value;
      const paymentMethod = paymentMethodSelect.value;
      const amount = Number(amountInput.value);
      const notes = notesInput.value.trim();

      if (!date || !services.length || !currency || !paymentMethod || !amount) {
        showMessage(formError, t("requiredError"));
        return;
      }

      const payload = {
        date,
        services,
        currency,
        paymentMethod,
        amount,
        notes,
        updatedAt: serverTimestamp()
      };

      try {
        if (editingRecordId) {
          await updateDoc(doc(db, "incomeRecords", editingRecordId), payload);
          showMessage(formMessage, t("updateSuccess"));
        } else {
          await addDoc(collection(db, "incomeRecords"), {
            ...payload,
            createdAt: serverTimestamp()
          });
          showMessage(formMessage, t("saveSuccess"));
        }

        resetForm();
      } catch (error) {
        showMessage(formError, (editingRecordId ? t("updateError") : t("saveError")) + error.message);
      }
    });

    monthFilter.addEventListener("change", renderRecords);
    currencyFilter.addEventListener("change", renderRecords);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.classList.add("hidden");
        appScreen.classList.remove("hidden");
        userEmail.textContent = `${t("loggedInAs")}${user.email}`;

        if (!monthFilter.value) {
          monthFilter.value = currentMonthString();
        }

        resetForm();
        showIncomePage();
        renderTarotCard();

        if (unsubscribeRecords) unsubscribeRecords();

        const recordsQuery = query(
          collection(db, "incomeRecords"),
          orderBy("date", "desc")
        );

        unsubscribeRecords = onSnapshot(recordsQuery, (snapshot) => {
          allRecords = snapshot.docs.map(docSnap => ({
            id: docSnap.id,
            ...docSnap.data()
          }));

          renderRecords();
        }, (error) => {
          recordsList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        });

      } else {
        appScreen.classList.add("hidden");
        loginScreen.classList.remove("hidden");
        userEmail.textContent = "";

        if (unsubscribeRecords) {
          unsubscribeRecords();
          unsubscribeRecords = null;
        }
      }

      applyLanguage();
    });

    applyLanguage();
    updatePaymentMethods();
    renderTarotCard();
  </script>

</body>
