<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estarot 隨機塔羅抽卡</title>

  <style>
    :root {
      --bg-dark: #211529;
      --bg-purple: #3a2448;
      --paper: #fff7e8;
      --paper-deep: #f3dfbd;
      --gold: #d7b36a;
      --rose: #d9a6b7;
      --plum: #4a2f58;
      --ink: #33233a;
      --muted: #7b637f;
      --whatsapp: #25d366;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Noto Serif TC", "Noto Sans TC", "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: var(--paper);
      background:
        radial-gradient(circle at top left, rgba(217, 166, 183, 0.25), transparent 28%),
        radial-gradient(circle at bottom right, rgba(215, 179, 106, 0.22), transparent 32%),
        linear-gradient(145deg, var(--bg-dark), var(--bg-purple));
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(255, 247, 232, 0.75) 1px, transparent 1px),
        radial-gradient(rgba(215, 179, 106, 0.75) 1px, transparent 1px);
      background-size: 46px 46px, 88px 88px;
      background-position: 0 0, 22px 34px;
      opacity: 0.32;
      z-index: 0;
    }

    .site {
      position: relative;
      z-index: 1;
    }

    header {
      width: 100%;
      padding: 10px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      border-bottom: 1px solid rgba(215, 179, 106, 0.45);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      position: relative;
      z-index: 10;
    }

    .logo {
      max-width: 84px;
      width: 22vw;
      height: auto;
      display: block;
    }

    .hero {
      width: min(760px, 92%);
      margin: 0 auto;
      padding: 44px 0 34px;
      text-align: center;
    }

    .main-image-frame {
      position: relative;
      background: rgba(255, 247, 232, 0.95);
      padding: 12px;
      border-radius: 32px;
      border: 2px solid rgba(215, 179, 106, 0.75);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28);
      transform: rotate(-0.8deg);
      margin-bottom: 32px;
    }

    .main-image-frame::before,
    .main-image-frame::after {
      content: "";
      position: absolute;
      width: 82px;
      height: 24px;
      background: rgba(217, 166, 183, 0.88);
      top: -10px;
      border-radius: 5px;
      opacity: 0.95;
    }

    .main-image-frame::before {
      left: 28px;
      transform: rotate(-8deg);
    }

    .main-image-frame::after {
      right: 28px;
      transform: rotate(8deg);
    }

    .main-image {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
    }

    h1, h2, h3, h4, p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(2.35rem, 8vw, 4.5rem);
      line-height: 1.1;
      letter-spacing: 0.06em;
      margin-bottom: 18px;
      color: var(--paper);
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
    }

    .hero-copy {
      width: min(640px, 100%);
      margin: 0 auto;
      font-size: clamp(1.05rem, 3vw, 1.28rem);
      line-height: 1.9;
      color: rgba(255, 247, 232, 0.92);
    }

    .hour-limit {
      display: inline-block;
      margin-top: 18px;
      padding: 7px 16px;
      border-radius: 999px;
      background: rgba(255, 247, 232, 0.9);
      color: var(--plum);
      border: 1px solid rgba(215, 179, 106, 0.65);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    .draw-section {
      width: min(820px, 92%);
      margin: 20px auto 0;
      padding: 34px 22px 44px;
      text-align: center;
      background: rgba(255, 247, 232, 0.94);
      color: var(--ink);
      border-radius: 34px 34px 0 0;
      border: 2px solid rgba(215, 179, 106, 0.72);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    .draw-section::before {
      content: "✦ tarot journal ✦";
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
      background: var(--rose);
      color: var(--ink);
      padding: 6px 18px;
      border-radius: 999px;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    h2 {
      font-size: clamp(1.65rem, 5vw, 2.35rem);
      color: var(--plum);
      margin-bottom: 12px;
      letter-spacing: 0.06em;
    }

    .section-copy {
      width: min(640px, 100%);
      margin: 0 auto 26px;
      color: var(--muted);
      line-height: 1.85;
      font-size: 0.98rem;
    }

    .draw-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 15px 26px;
      background: linear-gradient(135deg, var(--plum), #25162f);
      color: var(--paper);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(74, 47, 88, 0.25);
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
    }

    .draw-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(74, 47, 88, 0.3);
    }

    .draw-button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      box-shadow: none;
    }

    .shuffle-area {
      height: 110px;
      margin: 24px auto 10px;
      position: relative;
      display: none;
      width: min(320px, 100%);
    }

    .shuffle-area.show {
      display: block;
    }

    .mini-card {
      position: absolute;
      left: 50%;
      top: 14px;
      width: 62px;
      height: 90px;
      margin-left: -31px;
      border-radius: 8px;
      border: 4px solid var(--paper-deep);
      background:
        linear-gradient(135deg, rgba(215, 179, 106, 0.35), transparent),
        linear-gradient(160deg, var(--plum), #201328);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
      animation: shuffle 0.85s ease-in-out infinite;
    }

    .mini-card:nth-child(2) {
      animation-delay: 0.12s;
    }

    .mini-card:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes shuffle {
      0% { transform: translateX(-72px) rotate(-12deg); }
      35% { transform: translateX(0) rotate(4deg); }
      70% { transform: translateX(72px) rotate(12deg); }
      100% { transform: translateX(-72px) rotate(-12deg); }
    }

    .result-area {
      margin: 28px auto 0;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .result-area.show {
      display: flex;
    }

    .tarot-result-card {
      width: min(280px, 76vw);
      background: #fffdf6;
      border-radius: 18px;
      padding: 10px;
      border: 2px solid var(--gold);
      box-shadow: 0 18px 32px rgba(51, 35, 58, 0.2);
      transform: rotate(0.7deg);
      animation: reveal 0.55s ease both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(18px) scale(0.95) rotate(0.7deg); }
      to { opacity: 1; transform: translateY(0) scale(1) rotate(0.7deg); }
    }

    .tarot-result-card img {
      width: 100%;
      display: block;
      border-radius: 12px;
      background: var(--paper-deep);
    }

    .card-name {
      margin: 18px 0 10px;
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      color: var(--plum);
      letter-spacing: 0.04em;
      font-weight: 800;
    }

    .after-draw-row {
      display: none;
      margin-top: 18px;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .after-draw-row.show {
      display: flex;
    }

    .locked-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(74, 47, 88, 0.1);
      color: var(--plum);
      font-weight: 700;
      border: 1px solid rgba(74, 47, 88, 0.18);
    }

    .whatsapp-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--whatsapp);
      color: white;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(37, 211, 102, 0.22);
    }

    .countdown {
      min-height: 28px;
      margin-top: 16px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    footer {
      width: min(820px, 92%);
      margin: 0 auto 48px;
      padding: 24px 20px 34px;
      text-align: center;
      background: rgba(255, 247, 232, 0.9);
      color: var(--muted);
      border-left: 2px solid rgba(215, 179, 106, 0.72);
      border-right: 2px solid rgba(215, 179, 106, 0.72);
      border-bottom: 2px solid rgba(215, 179, 106, 0.72);
      border-radius: 0 0 34px 34px;
      line-height: 1.8;
      font-size: 0.86rem;
    }

    .since {
      margin-top: 16px;
      color: var(--plum);
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    @media (max-width: 560px) {
      header {
        padding: 8px 16px;
      }

      .logo {
        max-width: 76px;
        width: 24vw;
      }

      .hero {
        padding-top: 30px;
      }

      .draw-section {
        padding: 34px 16px 40px;
      }
    }
  </style>
</head>

    <main>

            rel="noopener"
          >
            WhatsApp 查詢詳細解讀
          </a>
        </div>

        <div id="countdown" class="countdown"></div>
      </section>
    </main>

    <footer>
      <div>* 本抽卡頁面只作隨機抽牌用途，不包含任何牌義或解讀內容。</div>
      <div>* 限制以同一裝置及瀏覽器記錄為準。</div>
      <div class="since">Estarot since 2013</div>
    </footer>
  </div>

        { name: "Five of Pentacles 錢幣五", img: "https://upload.wikimedia.org/wikipedia/commons/9/96/Pents05.jpg" },
        { name: "Six of Pentacles 錢幣六", img: "https://upload.wikimedia.org/wikipedia/commons/a/a6/Pents06.jpg" },
        { name: "Seven of Pentacles 錢幣七", img: "https://upload.wikimedia.org/wikipedia/commons/6/6a/Pents07.jpg" },
        { name: "Eight of Pentacles 錢幣八", img: "https://upload.wikimedia.org/wikipedia/commons/4/49/Pents08.jpg" },
        { name: "Nine of Pentacles 錢幣九", img: "https://upload.wikimedia.org/wikipedia/commons/f/f0/Pents09.jpg" },
        { name: "Ten of Pentacles 錢幣十", img: "https://upload.wikimedia.org/wikipedia/commons/4/42/Pents10.jpg" },
        { name: "Page of Pentacles 錢幣侍者", img: "https://upload.wikimedia.org/wikipedia/commons/e/ec/Pents11.jpg" },
        { name: "Knight of Pentacles 錢幣騎士", img: "https://upload.wikimedia.org/wikipedia/commons/d/d5/Pents12.jpg" },
        { name: "Queen of Pentacles 錢幣皇后", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/Pents13.jpg" },
        { name: "King of Pentacles 錢幣國王", img: "https://upload.wikimedia.org/wikipedia/commons/1/1c/Pents14.jpg" }
      ];

      const drawButton = document.getElementById("drawButton");
      const shuffleArea = document.getElementById("shuffleArea");
      const resultArea = document.getElementById("resultArea");
      const cardImage = document.getElementById("cardImage");
      const cardName = document.getElementById("cardName");
      const afterDrawRow = document.getElementById("afterDrawRow");
      const countdown = document.getElementById("countdown");

      const STORAGE_KEY = "estarot_random_tarot_last_draw";
      const CARD_KEY = "estarot_random_tarot_last_card";
      const ONE_HOUR = 60 * 60 * 1000;

      function safeGetItem(key) {
        try {
          return localStorage.getItem(key);
        } catch (error) {
          return null;
        }
      }

      function safeSetItem(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (error) {
          // If browser blocks localStorage, the draw still works but the one-hour lock may not be saved.
        }
      }

      function safeRemoveItem(key) {
        try {
          localStorage.removeItem(key);
        } catch (error) {
          // Ignore storage errors.
        }
      }

      function getRemainingTime() {
        const lastDraw = Number(safeGetItem(STORAGE_KEY));
        if (!lastDraw || Number.isNaN(lastDraw)) return 0;
        return Math.max(0, ONE_HOUR - (Date.now() - lastDraw));
      }

      function formatCountdown(milliseconds) {
        const totalSeconds = Math.ceil(milliseconds / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return minutes + "分" + String(seconds).padStart(2, "0") + "秒";
      }

      function showCard(card) {
        if (!card || !card.img || !card.name) return;
        cardImage.src = card.img;
        cardImage.alt = card.name;
        cardName.textContent = card.name;
        resultArea.classList.add("show");
        afterDrawRow.classList.add("show");
      }

      function lockDrawing() {
        drawButton.disabled = true;
        drawButton.textContent = "暫時不能再抽卡";
        afterDrawRow.classList.add("show");
      }

      function unlockDrawing() {
        drawButton.disabled = false;
        drawButton.textContent = "我準備好抽我的塔羅卡";
        countdown.textContent = "";
      }

      function updatePageState() {
        const remaining = getRemainingTime();
        const savedCard = safeGetItem(CARD_KEY);

        if (remaining > 0) {
          lockDrawing();
          countdown.textContent = "距離下一次抽卡：" + formatCountdown(remaining);

          if (savedCard && !resultArea.classList.contains("show")) {
            try {
              showCard(JSON.parse(savedCard));
            } catch (error) {
              safeRemoveItem(CARD_KEY);
            }
          }
        } else {
          unlockDrawing();
        }
      }

      drawButton.addEventListener("click", function () {
        if (getRemainingTime() > 0) {
          updatePageState();
          return;
        }

        resultArea.classList.remove("show");
        afterDrawRow.classList.remove("show");
        shuffleArea.classList.add("show");
        drawButton.disabled = true;
        drawButton.textContent = "正在洗牌⋯⋯";
        countdown.textContent = "";

        setTimeout(function () {
          const selectedCard = tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
          safeSetItem(STORAGE_KEY, String(Date.now()));
          safeSetItem(CARD_KEY, JSON.stringify(selectedCard));

          shuffleArea.classList.remove("show");
          showCard(selectedCard);
          updatePageState();
        }, 1600);
      });

      updatePageState();
      setInterval(updatePageState, 1000);
    });
  </script>
</body>
</html>
